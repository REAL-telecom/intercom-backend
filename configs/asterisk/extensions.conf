[from-domophone]
exten => 1001,1,NoOp(Intercom incoming)
 same => n,Ringing()
 same => n,Set(PANEL_IP=${CUT(${CHANNEL(pjsip,remote_addr)},:,1)})
 same => n,Stasis(intercom,${PANEL_IP},${EXTEN})
 same => n,Hangup()

exten => busy,1,NoOp(Busy - user rejected)
 same => n,Playback(ru/number-not-answering&ru/pls-try-call-later&ru/goodbye)
 same => n,Wait(1)
 same => n,Hangup()

exten => noanswer,1,NoOp(No answer - timeout)
 same => n,Playback(ru/vm-nobodyavail&ru/pls-try-call-later&ru/goodbye)
 same => n,Wait(1)
 same => n,Hangup()

; Outbound OTP call (variables OTP_D1..OTP_D5 set via ARI originate)
[otp-out]
exten => s,1,NoOp(OTP playback)
 same => n,Playback(custom/otp/intro)
 same => n,Playback(custom/otp/${OTP_D1})
 same => n,Playback(custom/otp/${OTP_D2})
 same => n,Playback(custom/otp/${OTP_D3})
 same => n,Playback(custom/otp/${OTP_D4})
 same => n,Playback(custom/otp/${OTP_D5})
 same => n,Playback(custom/otp/repeat)
 same => n,Playback(custom/otp/code)
 same => n,Playback(custom/otp/${OTP_D1})
 same => n,Playback(custom/otp/${OTP_D2})
 same => n,Playback(custom/otp/${OTP_D3})
 same => n,Playback(custom/otp/${OTP_D4})
 same => n,Playback(custom/otp/${OTP_D5})
 same => n,Playback(custom/otp/thank_you_real)
 same => n,Playback(custom/otp/goodbye)
 same => n,Hangup()
