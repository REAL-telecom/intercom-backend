[Definition]
# Asterisk 22: отдельный паттерн на тип события
failregex =
  # NOTICE: неудачные REGISTER/INVITE/OPTIONS — failed for 'IP:port'
  #^.*res_pjsip/pjsip_distributor\.c: Request '(REGISTER|INVITE|OPTIONS)' .* failed for '<HOST>:\d+'
  # NOTICE (Asterisk 22): log_failed_request — failed for 'IP:port'
  ^.*res_pjsip/pjsip_distributor\.c:\d+ log_failed_request: Request '(REGISTER|INVITE|OPTIONS)' .* failed for '<HOST>:\d+'
  # SECURITY: несуществующий аккаунт
  ^.*SecurityEvent="InvalidAccountID".*RemoteAddress="IPV4/UDP/<HOST>/\d+"
  # SECURITY: неверный ответ на challenge
  ^.*SecurityEvent="ChallengeResponseFailed".*RemoteAddress="IPV4/UDP/<HOST>/\d+"
  # SECURITY: отправлен challenge (сканирование/брутфорс)
  ^.*SecurityEvent="ChallengeSent".*RemoteAddress="IPV4/UDP/<HOST>/\d+"
ignoreregex =
